<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>時光記憶圖譜：動態發展史</title>
  <link rel="stylesheet" href="style.css" />
  <!-- p5.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
</head>
<body>

  <!-- ╔══════════════════════════════════════╗ -->
  <!-- ║  主版面：左邊 p5 畫布 + 右邊 iframe  ║ -->
  <!-- ╚══════════════════════════════════════╝ -->

  <div id="app">

    <!-- 左側：p5.js 互動視覺 -->
    <div id="canvas-container">
      <!-- p5 畫布會由 sketch.js 注入此處 -->
    </div>

    <!-- 右側：iframe 顯示區 -->
    <div id="panel">
      <div id="panel-header">
        <span id="panel-title">時光記憶圖譜</span>
        <button id="panel-close" onclick="closePanel()">✕</button>
      </div>
      <div id="panel-body">
        <div id="default-hint">
          <div class="hint-star">✦</div>
          <p>點擊星點<br>探索學習記憶</p>
          <div class="hint-subtitle">Click a node to begin</div>
        </div>
        <iframe id="content-frame" src="" style="display:none;"></iframe>
      </div>
    </div>

  </div>

  <!-- 標題浮層 -->
  <div id="title-overlay">
    <div id="main-title">時光記憶圖譜</div>
    <div id="sub-title">STELLAR LEARNING CHRONICLE</div>
  </div>

  <script src="sketch.js"></script>
  <script>
    // 關閉面板 / 回到預設提示
    function closePanel() {
      document.getElementById('content-frame').style.display = 'none';
      document.getElementById('content-frame').src = '';
      document.getElementById('default-hint').style.display = 'flex';
      document.getElementById('panel-title').textContent = '時光記憶圖譜';
      // 通知 p5 清除選中
      if (window.clearSelectedNode) window.clearSelectedNode();
    }

    // 由 sketch.js 呼叫：載入 iframe
    function loadWeek(url, title) {
      document.getElementById('default-hint').style.display = 'none';
      const frame = document.getElementById('content-frame');
      frame.src = url;
      frame.style.display = 'block';
      document.getElementById('panel-title').textContent = title;
    }
  </script>
</body>
</html>
